<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#ffdada",
                    "on-surface": "#1a1c1c",
                    "surface-container-highest": "#e2e2e2",
                    "tertiary": "#5f3137",
                    "on-primary-fixed-variant": "#93000d",
                    "surface-container-low": "#f3f3f3",
                    "on-surface-variant": "#5c403d",
                    "on-error-container": "#93000a",
                    "surface-bright": "#f9f9f9",
                    "error": "#ba1a1a",
                    "outline": "#906f6b",
                    "on-secondary-fixed": "#40000b",
                    "surface-container": "#eeeeee",
                    "on-tertiary-container": "#febac1",
                    "surface-container-high": "#e8e8e8",
                    "primary-fixed": "#ffdad6",
                    "on-primary": "#ffffff",
                    "primary": "#84000a",
                    "background": "#f9f9f9",
                    "error-container": "#ffdad6",
                    "outline-variant": "#e5bdb9",
                    "on-secondary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#340f15",
                    "inverse-surface": "#2f3131",
                    "surface-tint": "#bd111a",
                    "primary-fixed-dim": "#ffb4ac",
                    "on-tertiary": "#ffffff",
                    "surface-dim": "#dadada",
                    "secondary-container": "#fe7f86",
                    "on-secondary-container": "#741623",
                    "primary-container": "#b00012",
                    "surface-variant": "#e2e2e2",
                    "on-background": "#1a1c1c",
                    "tertiary-fixed": "#ffd9dc",
                    "on-primary-container": "#ffbbb3",
                    "inverse-primary": "#ffb4ac",
                    "tertiary-container": "#7a484e",
                    "secondary": "#a43a43",
                    "tertiary-fixed-dim": "#f8b5bb",
                    "on-tertiary-fixed-variant": "#68393f",
                    "surface": "#f9f9f9",
                    "secondary-fixed-dim": "#ffb3b5",
                    "on-error": "#ffffff",
                    "inverse-on-surface": "#f1f1f1",
                    "on-secondary-fixed-variant": "#84222e",
                    "on-primary-fixed": "#410002"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "8px",
                    "touch-target": "56px",
                    "sm": "12px",
                    "lg": "32px",
                    "xl": "48px",
                    "xs": "4px",
                    "md": "24px"
            },
            "fontFamily": {
                    "label-sm": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "label-bold": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "label-sm": ["13px", {"lineHeight": "18px", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-bold": ["14px", {"lineHeight": "20px", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .squishy-scale:active {
            transform: scale(0.96);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .soft-card-shadow {
            box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.04);
        }
        body {
            background-color: #f9f9f9; /* Off-white background */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center p-md text-on-surface">
<div class="w-full max-w-md space-y-lg">
<!-- Brand Header Section -->
<header class="text-center space-y-xs">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-3xl mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-3xl" data-icon="restaurant_menu">restaurant_menu</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary">Join the Team</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Set up your DineFlow OS staff account</p>
</header>
<!-- Registration Form -->
<main class="space-y-md">
<form class="space-y-base">
<!-- Full Name Input -->
<div class="relative group">
<label class="block ml-6 mb-2 font-label-bold text-label-bold text-on-surface-variant">Full Name</label>
<div class="flex items-center bg-white rounded-full px-6 h-[56px] soft-card-shadow focus-within:ring-2 focus-within:ring-primary/20 transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3" data-icon="person">person</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body-md text-body-md placeholder:text-outline-variant" placeholder="Enter your name" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="relative group mt-md">
<label class="block ml-6 mb-2 font-label-bold text-label-bold text-on-surface-variant">Email</label>
<div class="flex items-center bg-white rounded-full px-6 h-[56px] soft-card-shadow focus-within:ring-2 focus-within:ring-primary/20 transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3" data-icon="mail">mail</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body-md text-body-md placeholder:text-outline-variant" placeholder="email@restaurant.com" type="email"/>
</div>
</div>
<!-- Role Selection (Dropdown Style) -->
<div class="relative group mt-md">
<label class="block ml-6 mb-2 font-label-bold text-label-bold text-on-surface-variant">Role</label>
<div class="flex items-center bg-white rounded-full px-6 h-[56px] soft-card-shadow focus-within:ring-2 focus-within:ring-primary/20 transition-all appearance-none cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant mr-3" data-icon="badge">badge</span>
<select class="flex-1 bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface appearance-none cursor-pointer">
<option disabled="" selected="" value="">Select your position</option>
<option value="server">Server</option>
<option value="chef">Chef / Kitchen Staff</option>
<option value="manager">Manager</option>
<option value="host">Host / Hostess</option>
<option value="bartender">Bartender</option>
</select>
<span class="material-symbols-outlined text-on-surface-variant ml-2" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Create PIN Input -->
<div class="relative group mt-md">
<label class="block ml-6 mb-2 font-label-bold text-label-bold text-on-surface-variant">Create PIN</label>
<div class="flex items-center bg-white rounded-full px-6 h-[56px] soft-card-shadow focus-within:ring-2 focus-within:ring-primary/20 transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3" data-icon="lock">lock</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body-md text-body-md placeholder:text-outline-variant tracking-widest" maxlength="4" placeholder="4-digit security code" type="password"/>
<span class="material-symbols-outlined text-on-surface-variant ml-2 cursor-pointer" data-icon="visibility">visibility</span>
</div>
<p class="mt-2 ml-6 font-label-sm text-label-sm text-on-surface-variant/60">This PIN is used for quick terminal access.</p>
</div>
<!-- Action Button -->
<div class="pt-lg">
<button class="w-full h-[56px] bg-primary text-white rounded-full font-label-bold text-label-bold shadow-lg shadow-primary/20 squishy-scale flex items-center justify-center space-x-2" type="submit">
<span>Create Account</span>
</button>
</div>
</form>
<!-- Footer Link -->
<footer class="text-center pt-md">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors inline-flex items-center space-x-1" href="#">
<span>Already have an account?</span>
<span class="font-label-bold text-primary">Login</span>
</a>
</footer>
</main>
</div>
<!-- Decorative Soft Elements -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden opacity-30 pointer-events-none">
<div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-primary-fixed rounded-full blur-[120px]"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-secondary-fixed rounded-full blur-[120px]"></div>
</div>
<!-- Bottom Aesthetic Detail -->
<div class="mt-xl flex items-center justify-center space-x-md text-outline-variant">
<div class="h-[1px] w-12 bg-outline-variant/30"></div>
<span class="font-label-sm text-label-sm tracking-widest uppercase opacity-40">DINEFLOW OS</span>
<div class="h-[1px] w-12 bg-outline-variant/30"></div>
</div>
</body></html>
