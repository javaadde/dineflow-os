<!DOCTYPE html>

<meta charset="utf-8"/>

<style>
        body {
            background-color: #f5f5f5;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .squishy-scale {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .squishy-scale:active {
            transform: scale(0.95);
        }
        .soft-elevation {
            box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.04), 0 4px 12px -2px rgba(0, 0, 0, 0.02);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="flex flex-col min-h-screen items-center justify-center p-6 text-on-surface">
<main class="w-full max-w-md flex flex-col items-center space-y-xl">
<header class="flex flex-col items-center text-center space-y-md">
<div class="w-24 h-24 rounded-full bg-white flex items-center justify-center soft-elevation mb-4">
<span class="material-symbols-outlined text-primary-container text-5xl" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
</div>
<div class="space-y-xs">
<h1 class="text-primary-container font-display-lg text-display-lg tracking-tighter">DineFlow OS</h1>
<p class="text-on-surface-variant font-body-lg text-body-lg">Welcome back, Staff</p>
</div>
</header>
<section class="w-full bg-white rounded-[32px] p-md soft-elevation space-y-md">
<div class="space-y-base">
<label class="block font-label-bold text-label-bold text-on-surface-variant px-4" for="staff-id">Staff ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full h-[64px] pl-14 pr-6 bg-surface-bright border-none rounded-full focus:ring-2 focus:ring-primary-container/20 text-body-md font-body-md placeholder:text-outline-variant transition-all" id="staff-id" placeholder="Enter your ID" type="text"/>
</div>
</div>
<div class="space-y-base">
<label class="block font-label-bold text-label-bold text-on-surface-variant px-4" for="pin">PIN</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full h-[64px] pl-14 pr-6 bg-surface-bright border-none rounded-full focus:ring-2 focus:ring-primary-container/20 text-body-md font-body-md placeholder:text-outline-variant tracking-widest transition-all" id="pin" placeholder="••••" type="password"/>
</div>
</div>
<button class="w-full h-touch-target bg-primary-container text-on-primary font-label-bold text-label-bold rounded-full squishy-scale shadow-lg shadow-primary-container/20 mt-4 flex items-center justify-center space-x-2">
<span>Login</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<div class="flex justify-center pt-2">
<a class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary-container transition-colors" href="#">Forgot PIN?</a>
</div>
</section>
<footer class="pt-xl text-center space-y-md">
<div class="flex items-center justify-center space-x-md">
<div class="w-12 h-1 bg-surface-container-highest rounded-full"></div>
<span class="text-outline text-label-sm font-label-sm">Authorized Access Only</span>
<div class="w-12 h-1 bg-surface-container-highest rounded-full"></div>
</div>
<div class="grid grid-cols-2 gap-md w-full">
<div class="flex items-center p-md bg-white/50 rounded-3xl space-x-sm">
<span class="material-symbols-outlined text-primary-container">support_agent</span>
<div class="text-left">
<p class="text-label-bold font-label-bold text-on-surface">IT Help</p>
<p class="text-label-sm font-label-sm text-on-surface-variant">Ext. 404</p>
</div>
</div>
<div class="flex items-center p-md bg-white/50 rounded-3xl space-x-sm">
<span class="material-symbols-outlined text-primary-container">sync</span>
<div class="text-left">
<p class="text-label-bold font-label-bold text-on-surface">System</p>
<p class="text-label-sm font-label-sm text-on-surface-variant">v2.4.0</p>
</div>
</div>
</div>
</footer>
</main>
<div class="fixed bottom-0 left-0 w-full p-xl pointer-events-none opacity-20 overflow-hidden select-none">
<div class="flex flex-wrap justify-center gap-xl grayscale opacity-10">
<span class="material-symbols-outlined text-9xl">restaurant</span>
<span class="material-symbols-outlined text-9xl">local_dining</span>
<span class="material-symbols-outlined text-9xl">wine_bar</span>
<span class="material-symbols-outlined text-9xl">bakery_dining</span>
<span class="material-symbols-outlined text-9xl">skillet</span>
</div>
</div>
